<!DOCTYPE html>
<html lang="es"> 

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BASTRA NET</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* REGLAS GENERALES Y RESETEO */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg, #020617, #0f172a, #111827);
color:white;
overflow-x: hidden;
/* EVITA EL REFRESCO POR DESLIZAMIENTO (PULL-TO-REFRESH) EN CELULARES */
overscroll-behavior-y: contain;
}

/* ANIMACIÓN INTERNA DE PÁGINAS */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

.fade-in {
animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* EFECTO SKELETON LOADER (PULSO ANIMADO) */
@keyframes pulse {
0% { opacity: 0.3; background: rgba(255, 255, 255, 0.03); }
50% { opacity: 0.8; background: rgba(255, 255, 255, 0.08); }
100% { opacity: 0.3; background: rgba(255, 255, 255, 0.03); }
}

.skeleton-card {
border-radius: 24px;
padding: 30px;
border: 1px solid rgba(255, 255, 255, 0.04);
animation: pulse 1.5s ease-in-out infinite;
display: flex;
flex-direction: column;
gap: 12px;
}

.skeleton-text {
height: 16px;
background: rgba(255, 255, 255, 0.08);
border-radius: 4px;
width: 60%;
}

.skeleton-title {
height: 24px;
background: rgba(255, 255, 255, 0.12);
border-radius: 6px;
width: 40%;
margin-bottom: 8px;
}

.skeleton-btn {
height: 45px;
background: rgba(255, 255, 255, 0.08);
border-radius: 14px;
width: 100%;
margin-top: 10px;
}

/* CONTAINER PARA LAS NOTIFICACIONES PERSONALIZADAS (TOASTS) */
#toast-container {
position: fixed;
top: 24px;
right: 24px;
z-index: 9999;
display: flex;
flex-direction: column;
gap: 12px;
pointer-events: none;
}

@keyframes slideInToast {
from { transform: translateX(120%) scale(0.9); opacity: 0; }
to { transform: translateX(0) scale(1); opacity: 1; }
}

@keyframes slideOutToast {
from { transform: translateX(0) scale(1); opacity: 1; }
to { transform: translateX(120%) scale(0.9); opacity: 0; }
}

.toast {
pointer-events: auto;
min-width: 320px;
max-width: 420px;
background: rgba(15, 23, 42, 0.85);
border: 1px solid rgba(255, 255, 255, 0.08);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
padding: 16px 20px;
border-radius: 18px;
box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
display: flex;
align-items: center;
gap: 14px;
animation: slideInToast 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
transition: all 0.3s ease;
}

.toast.hide {
animation: slideOutToast 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
}

.toast-icon {
font-size: 24px;
display: flex;
align-items: center;
justify-content: center;
width: 40px;
height: 40px;
border-radius: 12px;
}

.toast-success { border-left: 4px solid #22c55e; }
.toast-success .toast-icon { background: rgba(34, 197, 94, 0.15); color: #4ade80; }

.toast-error { border-left: 4px solid #ef4444; }
.toast-error .toast-icon { background: rgba(239, 68, 68, 0.15); color: #f87171; }

.toast-info { border-left: 4px solid #3b82f6; }
.toast-info .toast-icon { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }

.toast-content {
flex: 1;
}

.toast-message {
font-size: 14px;
font-weight: 500;
color: #f1f5f9;
line-height: 1.4;
}

/* LOGIN */
.login{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
}

.login-box{
width:100%;
max-width:400px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border-radius:32px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
animation: fadeIn 0.5s ease-out;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo h1{
font-size:36px;
font-weight: 700;
letter-spacing: -0.5px;
background:linear-gradient(90deg,#3b82f6,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo p{
color:#94a3b8;
margin-top:10px;
font-size: 14px;
}

/* INPUTS FORMULARIOS */
.input{
width:100%;
padding:16px 20px;
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
margin-bottom:20px;
outline:none;
background:rgba(255,255,255,.05);
color:white;
font-size: 15px;
transition: all 0.3s ease;
}

.input:focus {
border-color: #3b82f6;
background: rgba(255,255,255,.09);
box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
}

.input::placeholder{
color:#64748b;
}

.password-box{
position:relative;
width:100%;
margin-bottom:20px;
}

.password-box .input{
margin-bottom:0;
padding-right:60px;
}

.btn-ver{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
border:none;
background:transparent;
color:#94a3b8;
font-size:20px;
cursor:pointer;
transition: color 0.2s ease;
}

.btn-ver:hover {
color: #3b82f6;
}

/* BOTONES PROFESIONALES */
.btn{
width:100%;
padding:16px 24px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#2563eb,#06b6d4);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

.btn:hover{
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
filter: brightness(1.1);
}

.btn:active{
transform: translateY(0);
}

.btn-reportes{
width:100%;
padding:16px 24px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#8b5cf6,#6d28d9);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
}

.btn-reportes:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(109, 40, 217, 0.4);
filter: brightness(1.1);
}

.btn-anuncio-admin {
width: 100%;
padding: 16px 24px;
border: none;
border-radius: 16px;
background: linear-gradient(90deg, #0284c7, #06b6d4);
color: white;
font-size: 16px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
}

.btn-anuncio-admin:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
filter: brightness(1.1);
}

.btn-eliminar-danger {
width: 100%;
padding: 16px 24px;
border: none;
border-radius: 16px;
background: linear-gradient(90deg, #dc2626, #b91c1c);
color: white;
font-size: 16px;
font-weight: 600;
cursor: pointer;
margin-top: 16px;
transition: all 0.3s ease;
box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
}

.btn-eliminar-danger:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(185, 28, 28, 0.4);
filter: brightness(1.1);
}

/* APP E INTERFAZ PRINCIPAL */
.app{
display:none;
}

.header{
width:100%;
padding:24px 40px;
background:rgba(15, 23, 42, 0.6);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255, 255, 255, .06);
position:sticky;
top:0;
z-index:100;
}

.header-content{
max-width: 1200px;
margin: 0 auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-content h2 {
font-size: 24px;
font-weight: 700;
letter-spacing: -0.5px;
}

.logout{
border:none;
background:rgba(239, 68, 68, 0.15);
color:#ef4444;
border: 1px solid rgba(239, 68, 68, 0.3);
padding:10px 20px;
font-weight: 500;
border-radius:12px;
cursor:pointer;
transition: all 0.2s ease;
}

.logout:hover {
background:#ef4444;
color:white;
box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
}

.container{
max-width: 1200px;
margin: 0 auto;
padding: 40px 24px;
}

/* HOME GRID (TARJETAS GRANDES INICIALES) */
.home-grid{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
gap:28px;
margin-top: 10px;
}

.home-card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
border-radius:28px;
padding:35px;
cursor:pointer;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative;
overflow: hidden;
}

.home-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: linear-gradient(rgba(255,255,255,0.02), transparent);
opacity: 0; transition: opacity 0.3s ease;
}

.home-card:hover::before {
opacity: 1;
}

.home-card:hover{
transform:translateY(-6px);
background: rgba(255,255,255, 0.06);
box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.home-card h2 {
font-size: 15px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #94a3b8;
margin-bottom: 10px;
}

.home-card span{
font-size:52px;
font-weight:700;
display: block;
line-height: 1;
}

.avencer{
border-left:6px solid #eab308;
box-shadow: inset 5px 0 20px rgba(234, 179, 8, 0.05);
}
.avencer span { color: #facc15; }

.pagado{
border-left:6px solid #22c55e;
box-shadow: inset 5px 0 20px rgba(34, 197, 94, 0.05);
}
.pagado span { color: #4ade80; }

/* LISTADOS Y TARJETAS GENERALES */
.lista{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
gap:24px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:28px;
transition: all 0.3s ease;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.card:hover {
background: rgba(255,255,255, .06);
border-color: rgba(255,255,255, .12);
transform: translateY(-3px);
box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.card h2 {
font-size: 20px;
font-weight: 600;
margin-bottom: 8px;
color: #f8fafc;
}

.card p {
color: #94a3b8;
font-size: 14px;
margin-bottom: 6px;
}

/* ESTADOS PAGO */
.estado{
display:inline-block;
align-self: flex-start;
margin-top:16px;
padding:6px 16px;
border-radius:100px;
font-size:12px;
font-weight:600;
letter-spacing: 0.5px;
}

.estado-avencer{
background: rgba(234, 179, 8, 0.15);
color:#facc15;
border: 1px solid rgba(234, 179, 8, 0.25);
}

.estado-pagado{
background: rgba(34, 197, 94, 0.15);
color:#4ade80;
border: 1px solid rgba(34, 197, 94, 0.25);
}

/* VISTA DETALLE COMPLETA */
.detalle{
max-width:800px;
margin:auto;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.07);
backdrop-filter: blur(16px);
border-radius:32px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.detalle h1 {
font-size: 28px;
margin-bottom: 24px;
font-weight: 700;
border-bottom: 1px solid rgba(255,255,255,0.08);
padding-bottom: 16px;
}

.detalle p{
margin-bottom:16px;
color:#cbd5e1;
font-size: 16px;
display: flex;
justify-content: space-between;
align-items: center;
padding: 4px 0;
}

.detalle p strong {
color: white;
}

.btn-wsp{
width:100%;
padding:18px;
border:none;
border-radius:16px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:24px;
box-shadow: 0 4px 15px rgba(34, 197, 94, 0.25);
transition: all 0.3s ease;
}

.btn-wsp:hover {
transform: translateY(-2px);
box-shadow: 0 6px 22px rgba(34, 197, 94, 0.45);
filter: brightness(1.1);
}

.btn-boleta-cliente {
width:100%;
padding:18px;
border:none;
border-radius:16px;
background: linear-gradient(90deg, #0ea5e9, #2563eb);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:16px;
box-shadow: 0 4px 15px rgba(14, 165, 233, 0.25);
transition: all 0.3s ease;
}

.btn-boleta-cliente:hover {
transform: translateY(-2px);
box-shadow: 0 6px 22px rgba(37, 99, 235, 0.45);
filter: brightness(1.1);
}

.btn-back{
border:none;
padding:12px 24px;
border-radius:14px;
background:rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.08);
color:#cbd5e1;
font-weight: 500;
font-size: 14px;
cursor:pointer;
margin-bottom:28px;
transition: all 0.2s ease;
}

.btn-back:hover {
background: rgba(255,255,255,0.12);
color: white;
}

/* INTERFAZ DE ADMINISTRACIÓN */
.grid-admin{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(340px,1fr));
gap:28px;
margin-top:28px;
}

.columna{
background:rgba(255,255,255,.02);
border: 1px solid rgba(255,255,255,0.04);
padding:28px;
border-radius:24px;
}

.columna h2{
margin-bottom:24px;
font-size: 20px;
font-weight: 600;
border-bottom: 1px solid rgba(255,255,255,0.06);
padding-bottom: 12px;
}

.buscador-admin{
margin-bottom:35px;
}

.flex-botones-admin {
display: flex;
gap: 20px;
margin-bottom: 30px;
}

/* REPORTES INTERFACES */
.reporte-box{
background:rgba(255,255,255,.02);
padding:28px;
border-radius:24px;
margin-bottom:28px;
border:1px solid rgba(255,255,255,.05);
}

.reporte-box h2{
margin-bottom:20px;
font-size: 18px;
color:#38bdf8;
}

.reporte-item{
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.05);
display: flex;
justify-content: space-between;
color: #cbd5e1;
}

.reporte-item:last-child {
border-bottom: none;
}

.link-deuda{
color:#facc15;
font-weight:700;
cursor:pointer;
text-decoration:underline;
transition: color 0.2s ease;
}

.link-deuda:hover {
color: #eab308;
}

/* ANUNCIOS Y COMPONENTES VISUALES */
.anuncio-card {
background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(6, 182, 212, 0.12));
border: 1px solid rgba(6, 182, 212, 0.25);
border-radius: 24px;
padding: 28px;
margin-bottom: 35px;
box-shadow: 0 10px 30px rgba(6, 182, 212, 0.06);
}

.anuncio-card h2 {
color: #22d3ee;
font-size: 22px;
font-weight: 600;
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 12px;
}

.anuncio-card p {
color: #cbd5e1;
font-size: 15px;
line-height: 1.7;
margin-bottom: 18px;
}

.anuncio-card .anuncio-fecha {
font-size: 13px;
color: #64748b;
text-align: right;
font-weight: 500;
border-top: 1px solid rgba(6, 182, 212, 0.15);
padding-top: 10px;
}

</style>

</head>

<body>

<div id="toast-container"></div>

<div class="login" id="login">

<input
type="text"

👁️

BASTRA NET

onclick="salir()">

Salir

</div>

<div
class="container"
id="contenido">

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
setDoc,
deleteDoc
}
from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA8E7F8uZ3jy7FGHHi2kdub_RK0YVkiJ6s",
authDomain: "bastra-isp.firebaseapp.com",
projectId: "bastra-isp",
storageBucket: "bastra-isp.firebasestorage.app",
messagingSenderId: "909742776723",
appId: "1:909742776723:web:4bfeed6c27b1349d08c866"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ordenMeses = [
"Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
"Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
];
// Variable global para rastrear el rol o usuario activo y gestionar el botón Atrás
window.ROL_ACTUAL = null;

/* SISTEMA PRO DE NOTIFICACIONES FLOTANTES */
window.mostrarNotificacion = function(mensaje, tipo = "success") {
const container = document.getElementById("toast-container");
if (!container) return;
const toast = document.createElement("div");
toast.className = `toast toast-${tipo}`;

let icono = "✓";
if (tipo === "error") icono = "✕";
if (tipo === "info") icono = "ℹ";

toast.innerHTML = `
<div class="toast-icon">${icono}</div>
<div class="toast-content">
<div class="toast-message">${mensaje}</div>
</div>
`;

container.appendChild(toast);
setTimeout(() => {
toast.classList.add("hide");
toast.addEventListener("animationend", () => {
toast.remove();
});
}, 3500);
}

/* PLANTILLAS DE SKELETON LOADERS */
window.mostrarSkeletonDashboard = function() {
    document.getElementById("contenido").innerHTML = `
    <div class="home-grid">
        <div class="skeleton-card">
            <div class="skeleton-text" style="width: 40%"></div>
            <div class="skeleton-title" style="width: 25%; height: 40px;"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-text" style="width: 40%"></div>
            <div class="skeleton-title" style="width: 25%; height: 40px;"></div>
        </div>
    </div>
    `;
}

window.mostrarSkeletonListado = function() {
    let htmlSkeletons = '';
    for(let i = 0; i < 4; i++) {
        htmlSkeletons += `
        <div class="skeleton-card">
            <div class="skeleton-title"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text" style="width: 30%"></div>
            <div class="skeleton-btn" style="height: 40px; border-radius: 100px; width: 100px; margin-top: 10px;"></div>
        </div>
         `;
    }
    document.getElementById("contenido").innerHTML = `
    <div class="flex-botones-admin" style="gap:20px; margin-bottom: 30px;">
        <div class="skeleton-btn" style="margin-top:0; height: 50px;"></div>
        <div class="skeleton-btn" style="margin-top:0; height: 50px;"></div>
    </div>
    <div class="lista">${htmlSkeletons}</div>
    `;
}

/* ENRUTADOR INTELIGENTE (MANEJA EL BOTÓN ATRÁS DEL CELULAR) */
window.navegarA = function(vista, parametro = null) {
    // Almacenamos el estado en el historial del navegador
    history.pushState({ vista: vista, parametro: parametro }, "");
    renderizarVista(vista, parametro);
}

// Escucha cuando el usuario usa el botón Atrás físico del teléfono
window.addEventListener("popstate", function(event) {
    if (window.ROL_ACTUAL) {
        if (event.state && event.state.vista) {
            renderizarVista(event.state.vista, event.state.parametro);
        } else {
            // Si regresa al inicio del historial de la app, lo mandamos al panel base correspondiente
            if (window.ROL_ACTUAL === "admin") {
                cargarAdmin(false);
            } else {
                cargarInicio(false);
            }
        }
    }
});

function renderizarVista(vista, parametro) {
    if (vista === "inicio-cliente") cargarInicio(false);
    if (vista === "ver-meses") verMeses(parametro, false);
    if (vista === "ver-detalle") verDetalle(parametro, false);
    if (vista === "inicio-admin") cargarAdmin(false);

/* REGISTRAR PAGO ASIGNADO POR EL ADMIN */
window.ejecutarPago = async function(id,mes){
const fecha = document.getElementById(`fecha-${mes}`).value.trim();
if(!fecha){ window.mostrarNotificacion("Determine la fecha en que se ejecutó la transferencia.", "error"); return; }

const snap = await getDocs(collection(db,"cliente"));
snap.forEach(async(docu)=>{
if(docu.id===id){
const cliente = docu.data();
cliente.Pagos[mes].estado = "PAGADO";
cliente.Pagos[mes].fechaPago = fecha;
await updateDoc(doc(db,"cliente",id), { Pagos: cliente.Pagos });
window.mostrarNotificacion(`Pago del mes de ${mes} registrado con éxito.`);

const index = window.CLIENTES_ADMIN.findIndex(c => c.id === id);
if(index !== -1) window.CLIENTES_ADMIN[index].Pagos = cliente.Pagos;

// Dispara PDF y WhatsApp para el admin
generarYEnviarComprobante(cliente, mes, fecha, true);
verAdminCliente(id, false);
}
});
}

/* FUNCIÓN COMPARTIDA DINÁMICA MEJORADA PARA COMPATIBILIDAD MÓVIL */
function generarYEnviarComprobante(cliente, mes, fechaPago, ejecutarDisparoWsp = true) {
    const pNombre = `Comprobante_${mes}_${cliente.usuario}.pdf`;
    const pagoInfo = cliente.Pagos[mes];
    const nroRecibo = Math.floor(100000 + Math.random() * 900000);
    
    const containerPdf = document.getElementById("comprobante-pdf-template");
    containerPdf.style.display = "block";
    containerPdf.innerHTML = `
        <div style="padding: 40px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; background: #fff; max-width: 600px; margin: auto;">
            <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #2563eb; padding-bottom: 20px; margin-bottom: 30px;">
                <div>
                    <h1 style="margin: 0; font-size: 26px; color: #1e3a8a; font-weight: bold; letter-spacing: -0.5px;">📡 BASTRA NET</h1>
                    <p style="margin: 4px 0 0 0; font-size: 13px; color: #666;">Conectividad de Alta Velocidad</p>
                    <p style="margin: 2px 0 0 0; font-size: 12px; color: #888;">Trujillo, Perú</p>
                </div>
                <div style="text-align: right;">
                    <h2 style="margin: 0; font-size: 16px; color: #2563eb; font-weight: 600;">RECIBO DE PAGO</h2>
                    <p style="margin: 5px 0 0 0; font-size: 13px; font-weight: bold; color: #ff0000;">N° BASTRA-${nroRecibo}</p>
                    <p style="margin: 2px 0 0 0; font-size: 12px; color: #555;">Emisión: ${fechaPago}</p>
                </div>
            </div>

            <div style="background: #f8fafc; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #e2e8f0;">
                <h3 style="margin: 0 0 12px 0; font-size: 14px; color: #1e3a8a; text-transform: uppercase; letter-spacing: 0.5px;">DATOS DEL SUSCRIPTOR</h3>
                <p style="margin: 0 0 6px 0; font-size: 14px;"><strong>Cliente:</strong> ${cliente.nombre}</p>
                <p style="margin: 0 0 6px 0; font-size: 14px;"><strong>Usuario de Acceso:</strong> ${cliente.usuario}</p>
                <p style="margin: 0; font-size: 14px;"><strong>Celular asignado:</strong> ${cliente.celular || 'No registrado'}</p>
            </div>

            <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
                <thead>
                    <tr style="background: #2563eb; color: #fff;">
                        <th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600;">DESCRIPCIÓN DEL SERVICIO</th>
                        <th style="padding: 12px; text-align: center; font-size: 13px; font-weight: 600; width: 120px;">PERIODO</th>
                        <th style="padding: 12px; text-align: right; font-size: 13px; font-weight: 600; width: 120px;">TOTAL</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom: 1px solid #e2e8f0;">
                        <td style="padding: 16px 12px; font-size: 14px; color: #333;">Servicio de Internet Banda Ancha de Fibra Óptica Dedicada</td>
                        <td style="padding: 16px 12px; font-size: 14px; text-align: center; color: #555;">${mes}</td>
                        <td style="padding: 16px 12px; font-size: 14px; text-align: right; font-weight: 600; color: #333;">S/ ${pagoInfo.monto}.00</td>
                    </tr>
                </tbody>
            </table>

            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 2px dashed #e2e8f0; padding-top: 20px;">
                <div>
                    <span style="display: inline-block; background: #dcfce7; color: #15803d; padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: bold; text-transform: uppercase;">✓ TRANSACCIÓN EXITOSA (PAGADO)</span>
                </div>
                <div style="text-align: right; min-width: 200px;">
                    <table style="width: 100%;">
                        <tr>
                            <td style="font-size: 14px; color: #666; padding: 4px 0;">Subtotal:</td>
                            <td style="font-size: 14px; text-align: right; padding: 4px 0;">S/ ${pagoInfo.monto}.00</td>
                        </tr>
                        <tr>
                            <td style="font-size: 16px; font-weight: bold; color: #1e3a8a; padding: 6px 0;">Monto Neto Pagado:</td>
                            <td style="font-size: 16px; font-weight: bold; color: #1e3a8a; text-align: right; padding: 6px 0;">S/ ${pagoInfo.monto}.00</td>
                        </tr>
                    </table>
                </div>
            </div>

            <div style="margin-top: 60px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                <p style="margin: 0; font-size: 12px; color: #999;">¡Gracias por ser parte de BASTRA NET! Tu conexión confiable.</p>
                <p style="margin: 4px 0 0 0; font-size: 11px; color: #bbb;">Este documento es un comprobante digital emitido de manera automática.</p>
            </div>
        </div>
    `;

    const opciones = {
        margin:       0.5,
        filename:     pNombre,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    // Detectar si el dispositivo es móvil o tablet
    const esDispositivoMovil = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    if (esDispositivoMovil) {
        // Lógica Pro para Celulares: Genera el Blob binario y lo abre en pestaña/visor alterno
        html2pdf().set(opciones).from(containerPdf).toPdf().output('bloburl').then((blobUrl) => {
            containerPdf.style.display = "none";
            window.mostrarNotificacion("Comprobante generado. Se abrirá en el visor de tu teléfono.", "info");
            
            // Forzar apertura segura en nueva pestaña nativa del móvil
            const nuevaVentana = window.open(blobUrl, '_blank');
            if(!nuevaVentana || nuevaVentana.closed || typeof nuevaVentana.closed=='undefined') {
                // Si el navegador bloquea las popups de blobs, creamos un enlace dinámico de respaldo
                const linkRespaldo = document.createElement('a');
                linkRespaldo.href = blobUrl;
                linkRespaldo.target = '_blank';
                linkRespaldo.download = pNombre;
                document.body.appendChild(linkRespaldo);
                linkRespaldo.click();
                document.body.removeChild(linkRespaldo);
            }

            ejecutarEnvioWhatsApp(cliente, mes, nroRecibo, fechaPago, ejecutarDisparoWsp);
        }).catch(err => {
            console.error("Error en flujo móvil:", err);
            containerPdf.style.display = "none";
        });
    } else {
        // Lógica limpia original para Computadoras de Escritorio (PC)
        html2pdf().set(opciones).from(containerPdf).save().then(() => {
            containerPdf.style.display = "none";
            window.mostrarNotificacion(`Boleta de ${mes} descargada correctamente.`);
            ejecutarEnvioWhatsApp(cliente, mes, nroRecibo, fechaPago, ejecutarDisparoWsp);
        }).catch(err => {
            console.error("Error al generar PDF en PC:", err);
            containerPdf.style.display = "none";
        });
    }
}

/* FUNCIÓN DE AUXILIO AUXILIAR: PROCESA EL DISPARO DE MENSAJE WHATSAPP */
function ejecutarEnvioWhatsApp(cliente, mes, nroRecibo, fechaPago, ejecutarDisparoWsp) {
    if(ejecutarDisparoWsp) {
        const pagoInfo = cliente.Pagos[mes];
        const celularDestino = cliente.celular ? cliente.celular.replace(/\s+/g, '') : "";
        const textoMensaje = `¡Hola *${cliente.nombre}*! 📡 Tu pago correspondiente al mes de *${mes}* ha sido procesado de manera exitosa en nuestro sistema. Adjuntamos los detalles del recibo:\n\n💵 *Monto:* S/${pagoInfo.monto}.00\n📅 *Fecha de Registro:* ${fechaPago}\n🔢 *Recibo:* BASTRA-${nroRecibo}\n\nEl PDF con tu comprobante oficial se ha generado en tu pantalla. ¡Gracias por confiar en *BASTRA NET*!`;
        const urlWsp = celularDestino ? `https://wa.me/51${celularDestino}?text=${encodeURIComponent(textoMensaje)}` : `https://wa.me/51934847581?text=${encodeURIComponent(textoMensaje)}`;
        window.open(urlWsp, '_blank');
    }
}

/* REIMPRIMIR UN COMPROBANTE (ADMIN) */
window.reimprimirComprobante = function(id, mes) {
    const cliente = window.CLIENTES_ADMIN.find(c => c.id === id);
    if(!cliente || !cliente.Pagos[mes]) return;
    const pago = cliente.Pagos[mes];
    generarYEnviarComprobante(cliente, mes, pago.fechaPago || "Reciente", true);
}

/* RETROTRAER ESTADO DE PAGO */
window.rehacerPago = async function(id,mes){
const snap = await getDocs(collection(db,"cliente"));
snap.forEach(async(docu)=>{
if(docu.id===id){
const cliente = docu.data();
cliente.Pagos[mes].estado = "VENCIDO";
cliente.Pagos[mes].fechaPago = "";
await updateDoc(doc(db,"cliente",id), { Pagos: cliente.Pagos });
window.mostrarNotificacion(`Transacción revertida. El mes de ${mes} volvió a estar pendiente.`, "info");

const index = window.CLIENTES_ADMIN.findIndex(c => c.id === id);
if(index !== -1) window.CLIENTES_ADMIN[index].Pagos = cliente.Pagos;

verAdminCliente(id, false);
}
});
}

/* LOGOUT */
window.salir = function(){
window.CLIENTE_ACTUAL = null;
window.ROL_ACTUAL = null;
window.CLIENTES_ADMIN = [];
document.getElementById("usuario").value = "";
document.getElementById("password").value = "";
document.getElementById("app").style.display="none";
document.getElementById("login").style.display="flex";
window.mostrarNotificacion("Sesión cerrada.");
}
