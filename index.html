<!DOCTYPE html>
<html lang="es"> 

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BASTRA NET</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* REGLAS GENERALES Y RESETEO */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg, #020617, #0f172a, #111827);
color:white;
overflow-x: hidden;
/* EVITA EL REFRESCO POR DESLIZAMIENTO (PULL-TO-REFRESH) EN CELULARES */
overscroll-behavior-y: contain;
}

/* ANIMACIÓN INTERNA DE PÁGINAS */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

.fade-in {
animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* EFECTO SKELETON LOADER (PULSO ANIMADO) */
@keyframes pulse {
0% { opacity: 0.3; background: rgba(255, 255, 255, 0.03); }
50% { opacity: 0.8; background: rgba(255, 255, 255, 0.08); }
100% { opacity: 0.3; background: rgba(255, 255, 255, 0.03); }
}

.skeleton-card {
border-radius: 24px;
padding: 30px;
border: 1px solid rgba(255, 255, 255, 0.04);
animation: pulse 1.5s ease-in-out infinite;
display: flex;
flex-direction: column;
gap: 12px;
}

.skeleton-text {
height: 16px;
background: rgba(255, 255, 255, 0.08);
border-radius: 4px;
width: 60%;
}

.skeleton-title {
height: 24px;
background: rgba(255, 255, 255, 0.12);
border-radius: 6px;
width: 40%;
margin-bottom: 8px;
}

.skeleton-btn {
height: 45px;
background: rgba(255, 255, 255, 0.08);
border-radius: 14px;
width: 100%;
margin-top: 10px;
}

/* CONTAINER PARA LAS NOTIFICACIONES PERSONALIZADAS (TOASTS) */
#toast-container {
position: fixed;
top: 24px;
right: 24px;
z-index: 9999;
display: flex;
flex-direction: column;
gap: 12px;
pointer-events: none;
}

@keyframes slideInToast {
from { transform: translateX(120%) scale(0.9); opacity: 0; }
to { transform: translateX(0) scale(1); opacity: 1; }
}

@keyframes slideOutToast {
from { transform: translateX(0) scale(1); opacity: 1; }
to { transform: translateX(120%) scale(0.9); opacity: 0; }
}

.toast {
pointer-events: auto;
min-width: 320px;
max-width: 420px;
background: rgba(15, 23, 42, 0.85);
border: 1px solid rgba(255, 255, 255, 0.08);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
padding: 16px 20px;
border-radius: 18px;
box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
display: flex;
align-items: center;
gap: 14px;
animation: slideInToast 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
transition: all 0.3s ease;
}

.toast.hide {
animation: slideOutToast 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
}

.toast-icon {
font-size: 24px;
display: flex;
align-items: center;
justify-content: center;
width: 40px;
height: 40px;
border-radius: 12px;
}

.toast-success { border-left: 4px solid #22c55e; }
.toast-success .toast-icon { background: rgba(34, 197, 94, 0.15); color: #4ade80; }

.toast-error { border-left: 4px solid #ef4444; }
.toast-error .toast-icon { background: rgba(239, 68, 68, 0.15); color: #f87171; }

.toast-info { border-left: 4px solid #3b82f6; }
.toast-info .toast-icon { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }

.toast-content {
flex: 1;
}

.toast-message {
font-size: 14px;
font-weight: 500;
color: #f1f5f9;
line-height: 1.4;
}

/* LOGIN */
.login{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
}

.login-box{
width:100%;
max-width:400px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border-radius:32px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
animation: fadeIn 0.5s ease-out;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo h1{
font-size:36px;
font-weight: 700;
letter-spacing: -0.5px;
background:linear-gradient(90deg,#3b82f6,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo p{
color:#94a3b8;
margin-top:10px;
font-size: 14px;
}

/* INPUTS FORMULARIOS */
.input{
width:100%;
padding:16px 20px;
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
margin-bottom:20px;
outline:none;
background:rgba(255,255,255,.05);
color:white;
font-size: 15px;
transition: all 0.3s ease;
}

.input:focus {
border-color: #3b82f6;
background: rgba(255,255,255,.09);
box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
}

.input::placeholder{
color:#64748b;
}

.password-box{
position:relative;
width:100%;
margin-bottom:20px;
}

.password-box .input{
margin-bottom:0;
padding-right:60px;
}

.btn-ver{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
border:none;
background:transparent;
color:#94a3b8;
font-size:20px;
cursor:pointer;
transition: color 0.2s ease;
}

.btn-ver:hover {
color: #3b82f6;
}

/* BOTONES PROFESIONALES */
.btn{
width:100%;
padding:16px 24px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#2563eb,#06b6d4);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

.btn:hover{
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
filter: brightness(1.1);
}

.btn:active{
transform: translateY(0);
}

.btn-reportes{
width:100%;
padding:16px 24px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#8b5cf6,#6d28d9);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
}

.btn-reportes:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(109, 40, 217, 0.4);
filter: brightness(1.1);
}

.btn-anuncio-admin {
width: 100%;
padding: 16px 24px;
border: none;
border-radius: 16px;
background: linear-gradient(90deg, #0284c7, #06b6d4);
color: white;
font-size: 16px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
}

.btn-anuncio-admin:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
filter: brightness(1.1);
}

.btn-eliminar-danger {
width: 100%;
padding: 16px 24px;
border: none;
border-radius: 16px;
background: linear-gradient(90deg, #dc2626, #b91c1c);
color: white;
font-size: 16px;
font-weight: 600;
cursor: pointer;
margin-top: 16px;
transition: all 0.3s ease;
box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
}

.btn-eliminar-danger:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(185, 28, 28, 0.4);
filter: brightness(1.1);
}

/* APP E INTERFAZ PRINCIPAL */
.app{
display:none;
}

.header{
width:100%;
padding:24px 40px;
background:rgba(15, 23, 42, 0.6);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.06);
position:sticky;
top:0;
z-index:100;
}

.header-content{
max-width: 1200px;
margin: 0 auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-content h2 {
font-size: 24px;
font-weight: 700;
letter-spacing: -0.5px;
}

.logout{
border:none;
background:rgba(239, 68, 68, 0.15);
color:#ef4444;
border: 1px solid rgba(239, 68, 68, 0.3);
padding:10px 20px;
font-weight: 500;
border-radius:12px;
cursor:pointer;
transition: all 0.2s ease;
}

.logout:hover {
background:#ef4444;
color:white;
box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
}

.container{
max-width: 1200px;
margin: 0 auto;
padding: 40px 24px;
}

/* HOME GRID (TARJETAS GRANDES INICIALES) */
.home-grid{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
gap:28px;
margin-top: 10px;
}

.home-card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
border-radius:28px;
padding:35px;
cursor:pointer;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative;
overflow: hidden;
}

.home-card::before {
content: '';
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;
background: linear-gradient(rgba(255,255,255,0.02), transparent);
opacity: 0; transition: opacity 0.3s ease;
}

.home-card:hover::before {
opacity: 1;
}

.home-card:hover{
transform:translateY(-6px);
background: rgba(255,255,255, 0.06);
box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.home-card h2 {
font-size: 15px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #94a3b8;
margin-bottom: 10px;
}

.home-card span{
font-size:52px;
font-weight:700;
display: block;
line-height: 1;
}

.avencer{
border-left:6px solid #eab308;
box-shadow: inset 5px 0 20px rgba(234, 179, 8, 0.05);
}
.avencer span { color: #facc15; }

.pagado{
border-left:6px solid #22c55e;
box-shadow: inset 5px 0 20px rgba(34, 197, 94, 0.05);
}
.pagado span { color: #4ade80; }

/* LISTADOS Y TARJETAS GENERALES */
.lista{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
gap:24px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:28px;
transition: all 0.3s ease;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.card:hover {
background: rgba(255,255,255, .06);
border-color: rgba(255,255,255, .12);
transform: translateY(-3px);
box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.card h2 {
font-size: 20px;
font-weight: 600;
margin-bottom: 8px;
color: #f8fafc;
}

.card p {
color: #94a3b8;
font-size: 14px;
margin-bottom: 6px;
}

/* ESTADOS PAGO */
.estado{
display:inline-block;
align-self: flex-start;
margin-top:16px;
padding:6px 16px;
border-radius:100px;
font-size:12px;
font-weight:600;
letter-spacing: 0.5px;
}

.estado-avencer{
background: rgba(234, 179, 8, 0.15);
color:#facc15;
border: 1px solid rgba(234, 179, 8, 0.25);
}

.estado-pagado{
background: rgba(34, 197, 94, 0.15);
color:#4ade80;
border: 1px solid rgba(34, 197, 94, 0.25);
}

/* VISTA DETALLE COMPLETA */
.detalle{
max-width:800px;
margin:auto;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.07);
backdrop-filter: blur(16px);
border-radius:32px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.detalle h1 {
font-size: 28px;
margin-bottom: 24px;
font-weight: 700;
border-bottom: 1px solid rgba(255,255,255,0.08);
padding-bottom: 16px;
}

.detalle p{
margin-bottom:16px;
color:#cbd5e1;
font-size: 16px;
display: flex;
justify-content: space-between;
align-items: center;
padding: 4px 0;
}

.detalle p strong {
color: white;
}

.btn-wsp{
width:100%;
padding:18px;
border:none;
border-radius:16px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:24px;
box-shadow: 0 4px 15px rgba(34, 197, 94, 0.25);
transition: all 0.3s ease;
}

.btn-wsp:hover {
transform: translateY(-2px);
box-shadow: 0 6px 22px rgba(34, 197, 94, 0.45);
filter: brightness(1.1);
}

.btn-back{
border:none;
padding:12px 24px;
border-radius:14px;
background:rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.08);
color:#cbd5e1;
font-weight: 500;
font-size: 14px;
cursor:pointer;
margin-bottom:28px;
transition: all 0.2s ease;
}

.btn-back:hover {
background: rgba(255,255,255,0.12);
color: white;
}

/* INTERFAZ DE ADMINISTRACIÓN */
.grid-admin{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(340px,1fr));
gap:28px;
margin-top:28px;
}

.columna{
background:rgba(255,255,255,.02);
border: 1px solid rgba(255,255,255,0.04);
padding:28px;
border-radius:24px;
}

.columna h2{
margin-bottom:24px;
font-size: 20px;
font-weight: 600;
border-bottom: 1px solid rgba(255,255,255,0.06);
padding-bottom: 12px;
}

.buscador-admin{
margin-bottom:35px;
}

.flex-botones-admin {
display: flex;
gap: 20px;
margin-bottom: 30px;
}

/* REPORTES INTERFACES */
.reporte-box{
background:rgba(255,255,255,.02);
padding:28px;
border-radius:24px;
margin-bottom:28px;
border:1px solid rgba(255,255,255,.05);
}

.reporte-box h2{
margin-bottom:20px;
font-size: 18px;
color:#38bdf8;
}

.reporte-item{
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.05);
display: flex;
justify-content: space-between;
color: #cbd5e1;
}

.reporte-item:last-child {
border-bottom: none;
}

.link-deuda{
color:#facc15;
font-weight:700;
cursor:pointer;
text-decoration:underline;
transition: color 0.2s ease;
}

.link-deuda:hover {
color: #eab308;
}

/* ANUNCIOS Y COMPONENTES VISUALES */
.anuncio-card {
background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(6, 182, 212, 0.12));
border: 1px solid rgba(6, 182, 212, 0.25);
border-radius: 24px;
padding: 28px;
margin-bottom: 35px;
box-shadow: 0 10px 30px rgba(6, 182, 212, 0.06);
}

.anuncio-card h2 {
color: #22d3ee;
font-size: 22px;
font-weight: 600;
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 12px;
}

.anuncio-card p {
color: #cbd5e1;
font-size: 15px;
line-height: 1.7;
margin-bottom: 18px;
}

.anuncio-card .anuncio-fecha {
font-size: 13px;
color: #64748b;
text-align: right;
font-weight: 500;
border-top: 1px solid rgba(6, 182, 212, 0.15);
padding-top: 10px;
}

</style>

</head>

<body>

<!-- CONTENEDOR FLOTANTE PARA AVISOS ANIMADOS -->
<div id="toast-container"></div>

<!-- CONTAINER DE LOGIN -->
<div class="login" id="login">

<div class="login-box">

<div class="logo">

<h1>📡 BASTRA NET</h1>

<p>
Sistema Inteligente de Internet
</p>

</div>

<input
type="text"
id="usuario"
class="input"
placeholder="Usuario">

<div class="password-box">

<input
type="password"
id="password"
class="input"
placeholder="Contraseña">

<button
class="btn-ver"
onclick="togglePassword()">

👁️

</button>

</div>

<button
class="btn"
onclick="ingresar()">

INGRESAR

</button>

</div>

</div>

<!-- CONTAINER DE APLICACIÓN -->
<div class="app" id="app">

<div class="header">

<div class="header-content">

<h2 id="titulo">
BASTRA NET
</h2>

<button
class="logout"
onclick="salir()">

Salir

</button>

</div>

</div>

<div
class="container"
id="contenido">

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
setDoc,
deleteDoc
}
from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA8E7F8uZ3jy7FGHHi2kdub_RK0YVkiJ6s",
authDomain: "bastra-isp.firebaseapp.com",
projectId: "bastra-isp",
storageBucket: "bastra-isp.firebasestorage.app",
messagingSenderId: "909742776723",
appId: "1:909742776723:web:4bfeed6c27b1349d08c866"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ordenMeses = [
"Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
"Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
];

// Variable global para rastrear el rol o usuario activo y gestionar el botón Atrás
window.ROL_ACTUAL = null; 

/* SISTEMA PRO DE NOTIFICACIONES FLOTANTES */
window.mostrarNotificacion = function(mensaje, tipo = "success") {
const container = document.getElementById("toast-container");
if (!container) return;

const toast = document.createElement("div");
toast.className = `toast toast-${tipo}`;

let icono = "✓";
if (tipo === "error") icono = "✕";
if (tipo === "info") icono = "ℹ";

toast.innerHTML = `
<div class="toast-icon">${icono}</div>
<div class="toast-content">
<div class="toast-message">${mensaje}</div>
</div>
`;

container.appendChild(toast);

setTimeout(() => {
toast.classList.add("hide");
toast.addEventListener("animationend", () => {
toast.remove();
});
}, 3500);
}

/* PLANTILLAS DE SKELETON LOADERS */
window.mostrarSkeletonDashboard = function() {
    document.getElementById("contenido").innerHTML = `
    <div class="home-grid">
        <div class="skeleton-card">
            <div class="skeleton-text" style="width: 40%"></div>
            <div class="skeleton-title" style="width: 25%; height: 40px;"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-text" style="width: 40%"></div>
            <div class="skeleton-title" style="width: 25%; height: 40px;"></div>
        </div>
    </div>
    `;
}

window.mostrarSkeletonListado = function() {
    let htmlSkeletons = '';
    for(let i = 0; i < 4; i++) {
        htmlSkeletons += `
        <div class="skeleton-card">
            <div class="skeleton-title"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text" style="width: 30%"></div>
            <div class="skeleton-btn" style="height: 40px; border-radius: 100px; width: 100px; margin-top: 10px;"></div>
        </div>
        `;
    }
    document.getElementById("contenido").innerHTML = `
    <div class="flex-botones-admin" style="gap:20px; margin-bottom: 30px;">
        <div class="skeleton-btn" style="margin-top:0; height: 50px;"></div>
        <div class="skeleton-btn" style="margin-top:0; height: 50px;"></div>
    </div>
    <div class="lista">${htmlSkeletons}</div>
    `;
}

/* ENRUTADOR INTELIGENTE (MANEJA EL BOTÓN ATRÁS DEL CELULAR) */
window.navegarA = function(vista, parametro = null) {
    // Almacenamos el estado en el historial del navegador
    history.pushState({ vista: vista, parametro: parametro }, "");
    renderizarVista(vista, parametro);
}

// Escucha cuando el usuario usa el botón Atrás físico del teléfono
window.addEventListener("popstate", function(event) {
    if (window.ROL_ACTUAL) {
        if (event.state && event.state.vista) {
            renderizarVista(event.state.vista, event.state.parametro);
        } else {
            // Si regresa al inicio del historial de la app, lo mandamos al panel base correspondiente
            if (window.ROL_ACTUAL === "admin") {
                cargarAdmin(false);
            } else {
                cargarInicio(false);
            }
        }
    }
});

function renderizarVista(vista, parametro) {
    if (vista === "inicio-cliente") cargarInicio(false);
    if (vista === "ver-meses") verMeses(parametro, false);
    if (vista === "ver-detalle") verDetalle(parametro, false);
    if (vista === "inicio-admin") cargarAdmin(false);
    if (vista === "ver-reportes") verReportes(false);
    if (vista === "ver-usuarios-deuda") verUsuariosDeuda(parametro, false);
    if (vista === "ver-editar-anuncio") verEditarAnuncio(false);
    if (vista === "ver-admin-cliente") verAdminCliente(parametro, false);
}

/* MOSTRAR CONTRASEÑA */
window.togglePassword = function(){
const input = document.getElementById("password");
input.type = input.type === "password" ? "text" : "password";
}

/* ACCESO DEL PANEL */
window.ingresar = async function(){
const usuario = document.getElementById("usuario").value.toLowerCase().trim();
const password = document.getElementById("password").value;

/* REPORTES ADMINISTRADOR */
window.verReportes = function(registrarHistorial = true){
if(registrarHistorial) { window.navegarA("ver-reportes"); return; }

const clientes = window.CLIENTES_ADMIN;
let usuariosAlDia = [];
let deudaMeses = {};
let ingresosMes = {};
const fechaActual = new Date();
const mesActual = fechaActual.getMonth();

ordenMeses.forEach((mes)=>{ ingresosMes[mes] = 0; });
for(let i = 1; i <= 12; i++){ deudaMeses[i] = []; }

clientes.forEach((cliente)=>{
let deuda = 0;
for(let i = 0; i <= mesActual; i++){
const mes = ordenMeses[i];
if(!cliente.Pagos[mes]) continue;
const pago = cliente.Pagos[mes];
if(pago.estado !== "PAGADO"){ deuda++; } else { ingresosMes[mes] += Number(pago.monto || 0); }
}
if(deuda === 0){ usuariosAlDia.push(cliente.nombre); }
if(deuda >=1 && deuda <=12){ deudaMeses[deuda].push(cliente); }
});

let html = `
<div class="fade-in">
<button class="btn-back" onclick="history.back()">← VOLVER</button>
<div class="detalle">
<h1 style="margin-bottom:30px;">📊 REPORTES FINANCIEROS Y DE ACCESO</h1>
<div class="reporte-box">
<h2>✅ Clientes Totalmente al Día</h2>
`;

if(usuariosAlDia.length === 0){
html += `<p style="color:#64748b;">No hay usuarios al día actualmente.</p>`;
} else {
usuariosAlDia.forEach((nombre)=>{ html += `<div class="reporte-item"><span>${nombre}</span> <strong style="color:#22c55e;">Al día</strong></div>`; });
}

html += `
</div>
<div class="reporte-box">
<h2>📌 Resumen de Cartera Morosa</h2>
`;

for(let i = 1; i <= 12; i++){
if(deudaMeses[i].length > 0){
html += `
<div class="reporte-item">
<span>Clientes que arrastran <span class="link-deuda" onclick="navegarA('ver-usuarios-deuda', ${i})">${i} mes(es)</span></span>
<strong>${deudaMeses[i].length} usuario(s)</strong>
</div>
`;
}
}

html += `
</div>
<div class="reporte-box">
<h2>💰 Registro Mensual de Ingresos</h2>
`;

ordenMeses.forEach((mes,index)=>{
if(index <= mesActual){
html += `<div class="reporte-item"><span>Recaudación de ${mes}:</span> <strong style="color:#4ade80;">S/${ingresosMes[mes]}</strong></div>`;
}
});

html += `</div></div></div>`;
document.getElementById("contenido").innerHTML = html;
}

/* PROCESAR E INYECTAR ANUNCIO EN BD */
window.guardarAnuncio = async function(idAnuncio) {
const nuevoTitulo = document.getElementById("edit-titulo-anuncio").value.trim();
const nuevoMensaje = document.getElementById("edit-mensaje-anuncio").value.trim();
const nuevaFecha = document.getElementById("edit-fecha-anuncio").value.trim();

if(!nuevoTitulo || !nuevoMensaje) { 
window.mostrarNotificacion("Complete los campos de Título y Cuerpo obligatoriamente.", "error"); 
return; 
}

try {
if(idAnuncio) {
await updateDoc(doc(db, "anuncio", idAnuncio), { titulo: nuevoTitulo, mensaje: nuevoMensaje, fecha: nuevaFecha });
} else {
await setDoc(doc(collection(db, "anuncio")), { titulo: nuevoTitulo, mensaje: nuevoMensaje, fecha: nuevaFecha });
}
window.mostrarNotificacion("Anuncio sincronizado y publicado correctamente.");
cargarAdmin(false);
} catch(e) { window.mostrarNotificacion("Error de comunicación: " + e.message, "error"); }
}

/* PROCESAR ELIMINACIÓN TOTAL DEL ANUNCIO */
window.eliminarAnuncio = async function(idAnuncio) {
if (!idAnuncio) return;
const confirmar = window.confirm("¿Confirmar eliminación absoluta del aviso? Ningún abonado podrá visualizar el aviso tras ejecutar esta acción.");
if (confirmar) {
try {
await deleteDoc(doc(db, "anuncio", idAnuncio));
window.mostrarNotificacion("Anuncio revocado por completo del sistema.", "info");
cargarAdmin(false);
} catch (e) { window.mostrarNotificacion("Inconveniente al borrar: " + e.message, "error"); }
}
}

</div>

pagados += `

<p><span>Vencimiento original:</span> ${pago.vencimiento}</p>

<button class="btn" style="background:linear-gradient(90deg, #475569, #334155); margin-top:15px;" onclick="rehacerPago('${docu.id}','${mes}')">🔄 REVERTIR RECAUDACIÓN</button>

}
});

document.getElementById("contenido").innerHTML = `

<button class="btn-back" onclick="history.back()">← VOLVER AL REGISTRO</button>
<div class="detalle" style="max-width:1000px;">

<p style="color:#64748b; margin-bottom:30px; justify-content: flex-start; gap:20px;">
<span><strong>User:</strong> ${cliente.usuario}</span>
<span><strong>Cel:</strong> ${cliente.telefono}</span>
</p>
<div class="grid-admin">
<div class="columna">
<h2 style="color:#facc15;">Pendientes por Procesar</h2>
${porPagar || '<p style="color:#64748b;">Ninguno pendiente</p>'}
</div>
<div class="columna">
<h2 style="color:#22c55e;">Historial de Cobros Ok</h2>
${pagados || '<p style="color:#64748b;">Ningún pago registrado</p>'}
</div>
</div>
</div>
</div>
`;
}
});
}

/* MARCAR REGISTRO DE COBRO */
window.marcarPagado = async function(id,mes){
const fecha = document.getElementById(`fecha-${mes}`).value;
if(!fecha){ window.mostrarNotificacion("Determine la fecha en que se ejecutó la transferencia.", "error"); return; }

const snap = await getDocs(collection(db,"cliente"));
snap.forEach(async(docu)=>{
if(docu.id===id){
const cliente = docu.data();
cliente.Pagos[mes].estado = "PAGADO";
cliente.Pagos[mes].fechaPago = fecha;
await updateDoc(doc(db,"cliente",id), { Pagos: cliente.Pagos });
window.mostrarNotificacion(`Pago del mes de ${mes} registrado con éxito.`);
verAdminCliente(id, false);
}
});
}

/* RETROTRAER ESTADO DE PAGO (REVERTIR TRANSACCIÓN) */
window.rehacerPago = async function(id,mes){
const snap = await getDocs(collection(db,"cliente"));
snap.forEach(async(docu)=>{
if(docu.id===id){
const cliente = docu.data();
cliente.Pagos[mes].estado = "VENCIDO";
cliente.Pagos[mes].fechaPago = "";
await updateDoc(doc(db,"cliente",id), { Pagos: cliente.Pagos });
window.mostrarNotificacion(`Transacción revertida. El mes de ${mes} volvió a estar pendiente.`, "info");
verAdminCliente(id, false);
}
});
}

}
